<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEEDO - 메인 홈 (컬러 적용)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nunito:wght@700;800;900&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', 'sans-serif'],
                        gowun: ['Gowun Dodum', 'sans-serif'],
                        logo: ['Nunito', 'Quicksand', 'sans-serif'], 
                    },
                    colors: {
                        // 사용자 지정 컬러 10종 완벽 적용
                        main: '#80A282',
                        sub: '#C0DAC1',
                        sys: {
                            warn: '#E57E70',
                            info: '#469FE3',
                            success: '#52B7A4',
                        },
                        neu: {
                            1: '#212B22', // 메인 텍스트, 강한 포인트
                            2: '#303E32', // 보조 텍스트
                            3: '#536155', // 설명 텍스트
                            4: '#6F7970', // 연한 텍스트, 비활성화 아이콘
                            5: '#A2ACA3', // 테두리, 배경, 비활성화 요소
                        },
                        white: '#FFFFFF',
                        transparent: 'transparent'
                    },
                    boxShadow: {
                        'soft': '0 8px 24px -6px rgba(33, 43, 34, 0.12), 0 4px 10px -4px rgba(33, 43, 34, 0.08)',
                        'sm-soft': '0 4px 10px -2px rgba(33, 43, 34, 0.08)',
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #A2ACA3; /* 디바이스 외부 배경 (neu-5) */
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px 0;
        }
        
        #app-container { 
            width: 360px; 
            height: 800px; 
            background-color: #FFFFFF; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.15); 
            border: 4px solid #212B22; /* neu-1 */
            border-radius: 24px;
        }
        
        main::-webkit-scrollbar { display: none; }
        main { -ms-overflow-style: none; scrollbar-width: none; }
        
        .water-drop { border-radius: 50% 50% 50% 10% / 50% 50% 50% 10%; transform: rotate(45deg); }
        
        @keyframes stampEffect {
            0% { transform: scale(2) rotate(-15deg); opacity: 0; }
            50% { transform: scale(0.9) rotate(-15deg); opacity: 1; }
            100% { transform: scale(1) rotate(-15deg); opacity: 1; }
        }
        
        .stamped-icon { animation: stampEffect 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; display: none; }
        .is-stamped .stamped-icon { display: block; }
        .is-stamped .unstamped-icon { display: none; }
        
        /* 스탬프 찍힌 후의 카드 상태 스타일링 (시스템 성공 컬러 적용) */
        .is-stamped .task-card { 
            background-color: #FFFFFF; 
            border-color: #52B7A4; /* sys-success */
            opacity: 0.8;
        }
        .is-stamped .task-title { 
            text-decoration: line-through; 
            color: #A2ACA3; /* neu-5 */
        }
        
        .progress-bar-fill { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
        #custom-message { transition: top 0.3s ease-in-out, opacity 0.3s ease-in-out; }
        .show-message { top: 24px !important; opacity: 1 !important; }
    </style>
</head>
<body class="text-neu-1 antialiased font-sans">

    <!-- 커스텀 메시지 박스 -->
    <div id="custom-message" class="absolute top-[-100px] left-1/2 transform -translate-x-1/2 z-[100] bg-neu-1 text-white px-5 py-3 rounded-full shadow-lg font-bold text-[13px] opacity-0 flex items-center gap-2.5 w-max">
        <i class="fa-solid fa-circle-check text-sys-success"></i>
        <span id="message-text">메시지 내용</span>
    </div>

    <div id="app-container" class="flex flex-col relative">

        <header class="flex items-center justify-between px-5 py-4 bg-white/90 backdrop-blur-md sticky top-0 z-40 border-b border-neu-5">
            <div class="flex items-center gap-2.5">
                <div class="w-6 h-6 bg-sub border-2 border-main water-drop flex items-center justify-center relative shadow-sm">
                    <div class="w-1.5 h-1.5 bg-white rounded-full absolute" style="top: 25%; right: 25%;"></div>
                </div>
                <h1 class="font-logo font-black text-[22px] text-neu-1 tracking-tight">SEEDO</h1>
            </div>
            <div class="flex items-center gap-4 text-neu-1">
                <button class="hover:text-main transition-colors focus:outline-none relative">
                    <i class="fa-regular fa-bell text-[22px]"></i>
                    <!-- 알림 뱃지: 시스템 경고 컬러 -->
                    <span class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 bg-sys-warn rounded-full border-2 border-white"></span>
                </button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto px-5 pb-[90px] pt-4">
            
            <section class="mb-8">
                <div class="flex justify-between items-end mb-3 px-1">
                    <div class="flex flex-col">
                        <h2 class="font-bold text-[20px] text-neu-1 leading-tight">주간 달성률</h2>
                        <span class="text-[12px] font-bold text-neu-3 mt-1">이번 주 3일 완료했어요!</span>
                    </div>
                    <!-- 달성률 텍스트: 메인 컬러 적용 -->
                    <span class="font-logo font-black text-main text-[22px] tracking-tight">60%</span>
                </div>
                
                <div class="bg-white border border-neu-5 rounded-2xl p-5 shadow-sm-soft hover:border-main transition-colors">
                    <!-- 프로그레스 바 -->
                    <div class="w-full h-2.5 bg-neu-5 rounded-full overflow-hidden mb-5">
                        <div class="h-full bg-main progress-bar-fill w-0" id="weekly-progress" style="width: 60%;"></div>
                    </div>

                    <!-- 요일별 스탬프 -->
                    <div class="flex justify-between items-center px-0.5">
                        <!-- 완료 (월, 화): 메인 컬러 배경 -->
                        <div class="flex flex-col items-center gap-1.5">
                            <span class="text-[11px] font-bold text-neu-1">월</span>
                            <div class="w-9 h-9 rounded-full bg-main flex items-center justify-center text-white shadow-sm">
                                <i class="fa-solid fa-leaf text-[13px]"></i>
                            </div>
                        </div>
                        <div class="flex flex-col items-center gap-1.5">
                            <span class="text-[11px] font-bold text-neu-1">화</span>
                            <div class="w-9 h-9 rounded-full bg-main flex items-center justify-center text-white shadow-sm">
                                <i class="fa-solid fa-leaf text-[13px]"></i>
                            </div>
                        </div>
                        <!-- 오늘 (수): 메인 컬러 테두리 및 서브 컬러 채움 -->
                        <div class="flex flex-col items-center gap-1.5">
                            <span class="text-[11px] font-black text-main">수</span>
                            <div class="w-9 h-9 rounded-full bg-white border-2 border-main flex items-center justify-center text-main relative shadow-sm overflow-hidden">
                                <div class="absolute bottom-0 left-0 w-full h-[60%] bg-sub z-0"></div>
                                <i class="fa-solid fa-droplet text-[13px] z-10"></i>
                            </div>
                        </div>
                        <!-- 미완료 (목~일): 뉴트럴 연한 컬러 -->
                        <div class="flex flex-col items-center gap-1.5">
                            <span class="text-[11px] font-bold text-neu-4">목</span>
                            <div class="w-9 h-9 rounded-full bg-white border border-dashed border-neu-5 flex items-center justify-center"></div>
                        </div>
                        <div class="flex flex-col items-center gap-1.5">
                            <span class="text-[11px] font-bold text-neu-4">금</span>
                            <div class="w-9 h-9 rounded-full bg-white border border-dashed border-neu-5 flex items-center justify-center"></div>
                        </div>
                        <div class="flex flex-col items-center gap-1.5">
                            <span class="text-[11px] font-bold text-neu-4">토</span>
                            <div class="w-9 h-9 rounded-full bg-white border border-dashed border-neu-5 flex items-center justify-center"></div>
                        </div>
                        <div class="flex flex-col items-center gap-1.5">
                            <span class="text-[11px] font-bold text-neu-4">일</span>
                            <div class="w-9 h-9 rounded-full bg-white border border-dashed border-neu-5 flex items-center justify-center"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="mb-10 relative">
                <!-- 메인/서브 컬러를 활용한 감각적인 카드 박스 -->
                <div class="bg-white border-2 border-main rounded-[24px] p-5 shadow-soft relative overflow-hidden flex flex-col justify-between min-h-[210px] group">
                    
                    <!-- 백그라운드 패턴용 사선 -->
                    <div class="absolute -right-6 -bottom-6 opacity-10 pointer-events-none group-hover:scale-110 transition-transform duration-500">
                        <i class="fa-solid fa-seedling text-[180px] text-main"></i>
                    </div>

                    <!-- 상단 정보 뱃지 그룹 -->
                    <div class="flex justify-between items-center z-10 relative mb-4">
                        <div class="flex gap-2">
                            <!-- 서브 컬러 배경 -->
                            <span class="bg-sub text-neu-1 text-[11px] font-black px-2.5 py-1.5 rounded-lg shadow-sm">Lv.2 떡잎</span>
                            <!-- 메인 컬러 배경 -->
                            <span class="bg-main text-white text-[11px] font-black px-2.5 py-1.5 rounded-lg shadow-sm">성장률 60%</span>
                        </div>
                        <!-- 시스템 경고 컬러 뱃지 -->
                        <div class="bg-white text-sys-warn text-[11px] font-bold px-2.5 py-1.5 rounded-full border border-sys-warn flex items-center gap-1 shadow-sm" id="water-badge">
                            <i class="fa-solid fa-droplet text-[10px]"></i> 수분 부족
                        </div>
                    </div>

                    <!-- 중앙-하단 콘텐츠 -->
                    <div class="flex justify-between items-end z-10 relative">
                        <div class="flex flex-col items-start gap-4">
                            <h2 class="font-gowun text-[22px] font-bold text-neu-1 leading-[1.3] tracking-tight" id="garden-title">
                                지민님의 떡잎<br>목말라 하고 있어요
                            </h2>
                            
                            <!-- 물주기 버튼: 메인 컬러 -->
                            <button class="bg-main text-white px-5 py-3 rounded-full font-black text-[14px] shadow-md flex items-center gap-2 transition-transform active:scale-95" onclick="waterPlant(this)">
                                <i class="fa-solid fa-hand-holding-droplet"></i>
                                물 주기
                            </button>
                        </div>

                        <!-- 식물 일러스트 -->
                        <div class="relative w-20 h-20 flex items-end justify-center pb-1">
                            <i class="fa-solid fa-seedling text-[56px] text-main relative z-10 drop-shadow-md pb-2"></i>
                            <!-- 흙 느낌 선 -->
                            <div class="w-14 h-2 bg-neu-2 rounded-full absolute bottom-1 z-10"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="mb-4">
                <div class="flex items-end justify-between mb-4 px-1">
                    <div>
                        <h3 class="font-black text-[18px] text-neu-1 leading-none">오늘의 케어</h3>
                    </div>
                    <div class="bg-neu-5/20 px-2.5 py-1 rounded-lg">
                        <span class="text-[11px] font-bold text-neu-3">총 4개</span>
                    </div>
                </div>

                <div class="space-y-3">
                    <!-- 항목 1: 컨디션 체크 (시스템 정보 컬러) -->
                    <div class="task-card bg-white border border-neu-5 rounded-2xl p-4 shadow-sm-soft flex items-center cursor-pointer hover:border-sys-info transition-colors" onclick="showMessage('컨디션 입력 페이지로 이동합니다.')">
                        <div class="w-12 h-12 rounded-full bg-sys-info/10 text-sys-info flex items-center justify-center flex-shrink-0">
                            <i class="fa-solid fa-face-smile text-[22px]"></i>
                        </div>
                        <div class="ml-3.5 flex-1">
                            <h4 class="task-title font-bold text-[15px] text-neu-1">컨디션 체크</h4>
                            <p class="text-[11px] text-neu-4 mt-0.5">피로도 지수 & 오늘의 통증 입력</p>
                        </div>
                        <div class="text-neu-4 w-6 h-6 flex items-center justify-center">
                            <i class="fa-solid fa-chevron-right text-[12px]"></i>
                        </div>
                    </div>

                    <!-- 항목 2: 수면 체크 (메인 컬러) -->
                    <div class="task-card bg-white border border-neu-5 rounded-2xl p-4 shadow-sm-soft flex items-center cursor-pointer hover:border-main transition-colors" onclick="showMessage('수면 기록 페이지로 이동합니다.')">
                        <div class="w-12 h-12 rounded-full bg-main/10 text-main flex items-center justify-center flex-shrink-0">
                            <i class="fa-solid fa-moon text-[22px]"></i>
                        </div>
                        <div class="ml-3.5 flex-1">
                            <h4 class="task-title font-bold text-[15px] text-neu-1">수면 체크</h4>
                            <p class="text-[11px] text-neu-4 mt-0.5">수면 시간 및 수면 퀄리티 기록</p>
                        </div>
                        <div class="text-neu-4 w-6 h-6 flex items-center justify-center">
                            <i class="fa-solid fa-chevron-right text-[12px]"></i>
                        </div>
                    </div>

                    <!-- 항목 3: 운동 루틴 (스탬프 - 시스템 성공 컬러) -->
                    <div class="task-card bg-white border border-neu-5 rounded-2xl p-4 shadow-sm-soft flex items-center cursor-pointer hover:border-sys-success transition-colors group relative overflow-hidden" onclick="toggleStamp(this)">
                        <div class="w-12 h-12 flex-shrink-0 flex items-center justify-center relative">
                            <!-- 미완료 시 점선 -->
                            <div class="unstamped-icon w-10 h-10 rounded-full border border-dashed border-neu-5 flex items-center justify-center text-neu-4 transition-colors">
                                <i class="fa-solid fa-droplet text-[12px]"></i>
                            </div>
                            <!-- 완료 시 스탬프 -->
                            <div class="stamped-icon absolute text-sys-success z-10">
                                <i class="fa-solid fa-stamp text-[36px]"></i>
                            </div>
                        </div>
                        <div class="ml-3.5 flex-1 z-10">
                            <h4 class="task-title font-bold text-[15px] text-neu-1 transition-all">운동 루틴 완료하기</h4>
                            <p class="text-[11px] text-neu-4 mt-0.5 group-[.is-stamped]:opacity-50">굽은 등 펴주는 10분 스트레칭 외 1건</p>
                        </div>
                        <!-- 포인트 뱃지: 메인 컬러 -->
                        <div class="bg-main text-white text-[11px] font-black px-2.5 py-1.5 rounded-lg z-10 group-[.is-stamped]:opacity-0 transition-opacity shadow-sm">
                            +10 P
                        </div>
                    </div>

                    <!-- 항목 4: 영양제 루틴 (스탬프 - 시스템 성공 컬러) -->
                    <div class="task-card bg-white border border-neu-5 rounded-2xl p-4 shadow-sm-soft flex items-center cursor-pointer hover:border-sys-success transition-colors group relative overflow-hidden" onclick="toggleStamp(this)">
                        <div class="w-12 h-12 flex-shrink-0 flex items-center justify-center relative">
                            <div class="unstamped-icon w-10 h-10 rounded-full border border-dashed border-neu-5 flex items-center justify-center text-neu-4 transition-colors">
                                <i class="fa-solid fa-droplet text-[12px]"></i>
                            </div>
                            <div class="stamped-icon absolute text-sys-success z-10">
                                <i class="fa-solid fa-stamp text-[36px]"></i>
                            </div>
                        </div>
                        <div class="ml-3.5 flex-1 z-10">
                            <h4 class="task-title font-bold text-[15px] text-neu-1 transition-all">영양제 루틴</h4>
                            <p class="text-[11px] text-neu-4 mt-0.5 group-[.is-stamped]:opacity-50">오메가3, 비타민C 복용 완료</p>
                        </div>
                        <div class="bg-main text-white text-[11px] font-black px-2.5 py-1.5 rounded-lg z-10 group-[.is-stamped]:opacity-0 transition-opacity shadow-sm">
                            +5 P
                        </div>
                    </div>

                </div>
            </section>
        </main>

        <!-- Bottom Navigation: 루틴 페이지 공통 NAV 스타일 -->
        <nav class="absolute inset-x-0 bottom-0 w-full h-[78px] bg-white border-t-2 border-neu-1 z-50 px-4 py-2 pb-3 rounded-b-[20px]">
            <ul class="flex justify-between items-center h-full pt-1">
                <!-- HOME: 현재 메인 페이지 활성 탭 -->
                <li class="flex flex-col items-center gap-1 w-full cursor-pointer relative text-main">
                    <div class="absolute -top-[13px] w-8 h-[3px] bg-main rounded-b-sm"></div>
                    <i class="ph-fill ph-house text-[24px]"></i>
                    <span class="font-logo font-black text-[10px]">HOME</span>
                </li>

                <!-- CARE -->
                <li class="flex flex-col items-center gap-1 w-full cursor-pointer text-neu-4 hover:text-main transition-colors">
                    <i class="ph ph-hand-heart text-[24px]"></i>
                    <span class="font-logo font-bold text-[10px]">CARE</span>
                </li>

                <!-- GARDEN -->
                <li class="flex flex-col items-center gap-1 w-full cursor-pointer text-neu-4 hover:text-main transition-colors">
                    <i class="ph ph-plant text-[24px]"></i>
                    <span class="font-logo font-bold text-[10px]">GARDEN</span>
                </li>

                <!-- SHOP -->
                <li class="flex flex-col items-center gap-1 w-full cursor-pointer text-neu-4 hover:text-main transition-colors">
                    <i class="ph ph-storefront text-[24px]"></i>
                    <span class="font-logo font-bold text-[10px]">SHOP</span>
                </li>

                <!-- MY PAGE -->
                <li class="flex flex-col items-center gap-1 w-full cursor-pointer text-neu-4 hover:text-main transition-colors">
                    <i class="ph ph-user text-[24px]"></i>
                    <span class="font-logo font-bold text-[10px]">MY PAGE</span>
                </li>
            </ul>
        </nav>

    </div>

    <script>
        function showMessage(msg) {
            const msgBox = document.getElementById('custom-message');
            document.getElementById('message-text').innerText = msg;
            
            msgBox.classList.add('show-message');
            
            setTimeout(() => {
                msgBox.classList.remove('show-message');
            }, 2500);
        }

        function toggleStamp(element) {
            const isStamped = element.classList.contains('is-stamped');
            
            if (!isStamped) {
                element.classList.add('is-stamped');
                // 시스템 성공 컬러 기반 애니메이션 알림
                if (window.navigator && window.navigator.vibrate) {
                    window.navigator.vibrate(50);
                }
            } else {
                showMessage('스탬프 인증을 취소했습니다.');
                element.classList.remove('is-stamped');
            }
        }

        function waterPlant(btn) {
            const badge = document.getElementById('water-badge');
            const title = document.getElementById('garden-title');
            
            // 버튼 상태 변경: neu-5 배경색 적용 (Tailwind JIT 우회를 위해 hex 사용)
            btn.innerHTML = '<i class="fa-solid fa-check text-white"></i> <span class="text-white">물주기 완료</span>';
            btn.className = 'bg-[#A2ACA3] text-white px-5 py-3 rounded-full font-bold text-[14px] flex items-center gap-2 pointer-events-none transition-colors duration-300';
            
            // 타이틀 변경
            title.innerHTML = '지민님의 떡잎이<br>촉촉해졌어요 ✨';
            
            // 뱃지 상태 변경: 시스템 성공 컬러 적용 (Tailwind JIT 우회를 위해 hex 사용)
            if(badge) {
                badge.className = 'bg-white text-[#52B7A4] text-[11px] font-bold px-2.5 py-1.5 rounded-full border border-[#52B7A4] flex items-center gap-1 shadow-sm transition-colors duration-300';
                badge.innerHTML = '<i class="fa-solid fa-face-smile text-[10px]"></i> 수분 가득';
            }

            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate([30, 50, 30]);
            }
            
            showMessage('정원에 물을 주었습니다!');
        }
    </script>
</body>
</html>
